function iconBadgeOff(){ return '<svg viewBox="0 0 24 24" fill="none"><path d="M12 2l8 3v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V5l8-3z" fill="#E2E6EF" stroke="#C7CEDC" stroke-width="1.4"/></svg>'; }
function iconCheckHero(){ return '<path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>'; }
function iconXHero(){ return '<path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>'; }
function bigIcon(pathSvg, color){ return '<svg viewBox="0 0 24 24" fill="none" style="width:48px;height:48px;color:'+color+'">'+pathSvg+'</svg>'; }
function formatTime(totalSeconds){ const s=Math.max(0,Math.floor(totalSeconds)); const m=Math.floor(s/60); const r=s%60; return m+':'+String(r).padStart(2,'0'); }

/* ---------------- render root ---------------- */
function clearTimerHandle(){ if(timerHandle){ clearInterval(timerHandle); timerHandle=null; } }
function startTimerTick(){
  clearTimerHandle();
  const tickFn = function(){
    const el = document.getElementById('timer-value');
    const L = state.lesson;
    if(!el || !L || L.answered !== null){ clearTimerHandle(); return; }
    el.textContent = formatTime((Date.now()-L.qStart)/1000);
  };
  tickFn();
  timerHandle = setInterval(tickFn, 500);
}

function render(){
  const app = document.getElementById('app');
  if(state.screen==="loading"){ app.innerHTML = "<div style='flex:1;display:flex;align-items:center;justify-content:center;color:#888;font-family:JetBrains Mono,monospace;'>Cargando glosario...</div>"; return; }
  if(state.screen==="map"){ app.innerHTML = renderHud() + renderMap(); attachMapEvents(); return; }
  if(state.screen==="lesson"){ app.innerHTML = renderLesson(); attachLessonEvents(); return; }
  if(state.screen==="summary"){ app.innerHTML = renderSummary(); attachSummaryEvents(); return; }
}

function renderHud(){
  return ''
  + '<div class="hud">'
  + '<div class="brand"><div class="brand-mark">'+lenvirLogoMark()+'</div><div class="brand-name">LENVIR</div></div>'
  + '<div class="hud-stats">'
  + '<div class="stat">'+iconFlame()+progress.streak+'</div>'
  + '<div class="stat">'+iconBolt()+progress.totalXP+'</div>'
  + '<button class="gear-btn" id="btn-settings">'+iconGear()+'</button>'
  + '</div></div>'
  + (state.settingsOpen ? renderSettings() : "")
  + (state.activeModule ? renderLevelSelect(state.activeModule) : "");
}
function renderMapBgSvg(){
  return '<svg class="map-bg-svg" viewBox="0 0 400 900" preserveAspectRatio="none">'
  + '<path d="M-20 80 C 100 40, 250 140, 420 70" stroke="#0056F5" stroke-width="2" fill="none"/>'
  + '<path d="M-20 300 C 120 260, 260 360, 420 290" stroke="#05DA95" stroke-width="2" fill="none"/>'
  + '<path d="M-20 550 C 90 510, 280 610, 420 540" stroke="#0056F5" stroke-width="2" fill="none"/>'
  + '<path d="M-20 780 C 140 740, 240 840, 420 770" stroke="#05DA95" stroke-width="2" fill="none"/>'
  + '</svg>';
}
function renderMap(){
  const aligns = ["left","right","center"];
  let nodes = "";
  const mids = Object.keys(MODULE_META);
  mids.forEach(function(mid, idx){
    const status = moduleStatus(mid);
    const align = aligns[idx%3];
    const meta = MODULE_META[mid];
    let totalStars = 0;
    for(let l=1;l<=meta.lessons;l++){ totalStars += progress.modules[mid][l].stars; }
    const maxStars = meta.lessons*3;
    let cls = "node-btn ";
    let inner = "";
    if(status==="locked"){ cls += "node-locked"; inner = iconLock(); }
    else {
      cls += status==="done" ? "node-done" : "node-current";
      inner = '<div class="node-id">M'+mid+'</div><div class="node-stars">'+[0,1,2].map(i=>iconStarMini(totalStars>=Math.ceil(maxStars*(i+1)/3))).join("")+'</div>';
    }
    nodes += (idx>0 ? '<div class="connector"></div>' : '')
      + '<div class="node-row '+align+'"><div class="node-col">'
      + '<button class="'+cls+'" data-mod="'+mid+'" '+(status==="locked"?"disabled":"")+'>'+inner+'</button>'
      + '<div class="node-label">M'+mid+' \u00b7 '+meta.name+'</div></div></div>';
  });
  const reviewCount = (progress.reviewQueue||[]).length;
  const reviewHtml = '<div class="review-banner '+(reviewCount?'':'empty')+'">'
    + '<div><div class="review-title">\ud83d\udcd6 Conceptos por repasar</div><div class="review-sub">'+(reviewCount? reviewCount+' pendiente(s)':'Sin pendientes')+'</div></div>'
    + (reviewCount? '<button class="level-btn review" id="btn-review">Repasar</button>' : '')
    + '</div>';
  return '<div class="map-wrap">'
    + renderMapBgSvg()
    + '<div class="map-intro"><div class="eyebrow">Programa Explorer \u00b7 100 conceptos</div><h2>Glosario Ambiental</h2>'
    + '<div class="tagline"><b>Learn.</b> <b class="g">Demonstrate.</b> Elevate.</div></div>'
    + reviewHtml
    + '<div class="path">'+nodes+'</div>'
    + '</div>';
}
function attachMapEvents(){
  document.getElementById('btn-settings').onclick = function(){ state.settingsOpen = true; render(); };
  const reviewBtn = document.getElementById('btn-review');
  if(reviewBtn) reviewBtn.onclick = startReviewLesson;
  document.querySelectorAll('.node-btn[data-mod]').forEach(function(btn){
    btn.onclick = function(){ const mid = btn.dataset.mod; if(moduleStatus(mid)==="locked") return; state.activeModule = mid; render(); };
  });
  if(state.activeModule) attachLevelSelectEvents();
  if(state.settingsOpen) attachSettingsEvents();
}

function renderLevelSelect(mid){
  const meta = MODULE_META[mid];
  let rows = "";
  for(let l=1;l<=meta.lessons;l++){
    const unlocked = isLessonUnlocked(mid, l);
    const rec = progress.modules[mid][l];
    const startIdx = (l-1)*10+1;
    const endIdx = Math.min(l*10, meta.total);
    const btnLabel = !unlocked ? "" : (rec.completed ? "Repasar" : "Empezar");
    rows += '<div class="level-card '+(unlocked?'':'locked')+'">'
      + '<div class="level-left"><div class="level-name">Lecci\u00f3n '+l+'</div>'
      + '<div class="level-sub">Conceptos '+startIdx+'\u2013'+endIdx+'</div>'
      + (unlocked ? '<div class="level-stars">'+[0,1,2].map(i=>iconStar(i<rec.stars)).join("")+'</div>' : '<div class="lock-pill">'+iconLock()+'<span>Bloqueado</span></div>')
      + '</div>'
      + (unlocked ? '<button class="level-btn '+(rec.completed?'review':'')+'" data-mod="'+mid+'" data-lesson="'+l+'">'+btnLabel+'</button>' : "")
      + '</div>';
  }
  return '<div class="overlay" id="level-overlay"><div class="sheet">'
    + '<button class="sheet-close" id="level-close">'+iconClose()+'</button>'
    + '<div class="module-tag">M\u00d3DULO M'+mid+'</div><h2>'+meta.name+'</h2>'
    + rows + '</div></div>';
}
function attachLevelSelectEvents(){
  const overlay = document.getElementById('level-overlay');
  if(!overlay) return;
  overlay.addEventListener('click', function(e){ if(e.target===overlay){ state.activeModule=null; render(); } });
  document.getElementById('level-close').onclick = function(){ state.activeModule=null; render(); };
  document.querySelectorAll('.level-btn[data-mod]').forEach(function(btn){
    btn.onclick = function(){ startLesson(btn.dataset.mod, parseInt(btn.dataset.lesson,10)); };
  });
}

function renderSettings(){
  const earned = {};
  getEarnedBadgeIds(progress).forEach(function(id){ earned[id]=true; });
  const badgesHtml = BADGES.map(function(b){
    const has = !!earned[b.id];
    return '<div class="badge-card '+(has?'earned':'locked')+'"><div class="badge-icon">'+(has?iconBadgeOn():iconBadgeOff())+'</div><div class="badge-name">'+b.name+'</div><div class="badge-desc">'+b.desc+'</div></div>';
  }).join("");
  const mastered = (progress.correctEver||[]).length;
  return '<div class="overlay" id="settings-overlay"><div class="sheet settings-sheet">'
    + '<button class="sheet-close" id="settings-close">'+iconClose()+'</button><h2>Tu progreso</h2>'
    + '<div class="settings-row"><div><div style="font-weight:600;font-size:14px;">Racha actual</div><div style="font-size:12.5px;color:var(--ink-soft);">'+progress.streak+' d\u00eda(s) consecutivos</div></div>'+iconFlame()+'</div>'
    + '<div class="settings-row"><div><div style="font-weight:600;font-size:14px;">Puntos acumulados</div><div style="font-size:12.5px;color:var(--ink-soft);">'+progress.totalXP+' XP totales</div></div></div>'
    + '<div class="settings-row"><div><div style="font-weight:600;font-size:14px;">Conceptos dominados</div><div style="font-size:12.5px;color:var(--ink-soft);">'+mastered+' / 100</div></div></div>'
    + '<div class="badges-grid">'+badgesHtml+'</div>'
    + '<div class="settings-row" style="margin-top:6px;"><div><div style="font-weight:600;font-size:14px;">Reiniciar progreso</div><div style="font-size:12.5px;color:var(--ink-soft);">Borra estrellas, XP, racha e insignias</div></div><button class="danger-btn" id="btn-reset">Reiniciar</button></div>'
    + '</div></div>';
}
function attachSettingsEvents(){
  const overlay = document.getElementById('settings-overlay');
  if(!overlay) return;
  overlay.addEventListener('click', function(e){ if(e.target===overlay){ state.settingsOpen=false; render(); } });
  document.getElementById('settings-close').onclick = function(){ state.settingsOpen=false; render(); };
  document.getElementById('btn-reset').onclick = function(){
    if(confirm("\u00bfSeguro que deseas reiniciar todo tu progreso en Lenvir Explorer?")){
      progress = defaultProgress();
      saveProgress();
      state.settingsOpen = false; state.activeModule = null; render();
    }
  };
}

/* ---------------- LESSON ---------------- */
function startLesson(mid, lessonNum){
  const pool = CASES.filter(function(c){ return String(c.mod)===String(mid) && c.lesson===lessonNum; });
  const queue = shuffle(pool);
  state.lesson = { mod:mid, lesson:lessonNum, queue:queue, idx:0, lives:5, correctCount:0, xpGained:0, answered:null, failed:false, isReview:false, results:[], timeScores:[], qStart:Date.now() };
  state.activeModule = null;
  state.screen = "lesson";
  render();
}
function startReviewLesson(){
  const items = (progress.reviewQueue||[]).map(function(rq){ return CASES.find(function(c){ return c.id===rq.caseId; }); }).filter(Boolean);
  if(items.length===0) return;
  const queue = shuffle(items).slice(0, Math.min(10, items.length));
  state.lesson = { mod:null, lesson:null, queue:queue, idx:0, lives:5, correctCount:0, xpGained:0, answered:null, failed:false, isReview:true, results:[], timeScores:[], qStart:Date.now() };
  state.screen = "lesson";
  render();
}
function renderLesson(){
  const L = state.lesson;
  const q = L.queue[L.idx];
  const pct = Math.round((L.idx/L.queue.length)*100);
  const livesHtml = Array.from({length:5}).map(function(_,i){ return '<div class="life-icon">'+iconHex(i<L.lives)+'</div>'; }).join("");
  const optionsHtml = q.options.map(function(opt,i){
    let cls = "option"; let disabledAttr = "";
    if(L.answered!==null){
      disabledAttr = "disabled";
      if(i===q.correctIndex) cls += " correct";
      else if(i===L.answered) cls += " wrong";
      else cls += " dim";
    }
    return '<button class="'+cls+'" data-idx="'+i+'" '+disabledAttr+'><span class="badge">'+"ABC"[i]+'</span><span>'+escapeHtml(opt)+'</span></button>';
  }).join("");
  let feedbackHtml = "";
  if(L.answered!==null){
    const correct = L.answered===q.correctIndex;
    const xpLabel = L.isReview ? '+5 XP' : '+10 XP';
    feedbackHtml = '<div class="feedback-sheet '+(correct?'ok':'bad')+'">'
      + '<div class="fb-row"><div class="stamp">'+(correct?'\u00a1DOMINADO!':'A REPASAR')+'</div>'
      + '<div class="fb-text"><div class="fb-title">'+(correct?('\u00a1Correcto! '+xpLabel):'No es esta definici\u00f3n')+'</div></div></div>'
      + '<div class="fb-body">'+escapeHtml(q.feedback)+'</div>'
      + '<button class="fb-continue" id="btn-continue">Continuar</button></div>';
  }
  const timerSeconds = L.answered===null ? (Date.now()-L.qStart)/1000 : (L.lastElapsedSeconds||0);
  const timerCls = L.answered===null ? 'timer-badge ticking' : 'timer-badge frozen';
  const timerHtml = '<div class="'+timerCls+'">'+iconClock()+'<span id="timer-value">'+formatTime(timerSeconds)+'</span></div>';
  return '<div class="lesson-top"><button class="exit-btn" id="btn-exit">'+iconClose()+'</button>'
    + '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    + '<div class="lives">'+livesHtml+'</div></div>'
    + '<div class="lesson-body">'
    + '<div class="case-tag-row"><div class="case-tag">'+q.id+(L.isReview?' \u00b7 REPASO':'')+'</div>'+timerHtml+'</div>'
    + '<div class="term-card"><div class="term-word">'+escapeHtml(q.termino)+'</div></div>'
    + '<div class="term-prompt">\u00bfCu\u00e1l es la definici\u00f3n correcta?</div>'
    + '<div class="options">'+optionsHtml+'</div></div>'
    + feedbackHtml;
}
function attachLessonEvents(){
  document.getElementById('btn-exit').onclick = function(){
    if(confirm("\u00bfSalir de la lecci\u00f3n? Perder\u00e1s el avance de esta sesi\u00f3n.")){ clearTimerHandle(); state.screen = "map"; state.lesson = null; render(); }
  };
  const L = state.lesson;
  if(L.answered===null){
    document.querySelectorAll('.option').forEach(function(btn){ btn.onclick = function(){ selectOption(parseInt(btn.dataset.idx,10)); }; });
    startTimerTick();
  } else {
    clearTimerHandle();
    const cont = document.getElementById('btn-continue');
    if(cont) cont.onclick = nextQuestion;
  }
}
function selectOption(optIdx){
  const L = state.lesson;
  if(L.answered!==null) return;
  const q = L.queue[L.idx];
  L.answered = optIdx;
  const correct = optIdx===q.correctIndex;

  const elapsed = Math.max(1, (Date.now()-L.qStart)/1000);
  L.lastElapsedSeconds = elapsed;
  const rawTime = Math.max(40, Math.min(130, Math.round((EXPECTED_TIME/elapsed)*100)));
  L.timeScores.push(rawTime);
  L.results.push({caseId:q.id, correct:correct});

  if(correct){
    L.correctCount++; L.xpGained += L.isReview ? 5 : 10;
    if(progress.correctEver.indexOf(q.id)===-1) progress.correctEver.push(q.id);
  } else {
    L.lives--;
    if(!L.isReview){
      if(!progress.reviewQueue.find(function(rq){ return rq.caseId===q.id; })){
        progress.reviewQueue.push({caseId:q.id, timesCorrect:0});
      }
    }
  }
  clearTimerHandle();
  render();
}
function nextQuestion(){
  const L = state.lesson;
  if(L.lives<=0){ L.failed = true; finishLesson(); return; }
  L.idx++; L.answered = null; L.qStart = Date.now();
  if(L.idx>=L.queue.length){ finishLesson(); return; }
  render();
}
function finishLesson(){
  clearTimerHandle();
  const L = state.lesson;
  const total = L.queue.length;
  const acc = total? L.correctCount/total : 0;

  if(L.isReview){
    L.results.forEach(function(r){
      const idx = progress.reviewQueue.findIndex(function(rq){ return rq.caseId===r.caseId; });
      if(idx>=0){
        if(r.correct){
          progress.reviewQueue[idx].timesCorrect = (progress.reviewQueue[idx].timesCorrect||0)+1;
          if(progress.reviewQueue[idx].timesCorrect>=2) progress.reviewQueue.splice(idx,1);
        } else { progress.reviewQueue[idx].timesCorrect = 0; }
      }
    });
    progress.totalXP += L.xpGained;
    L.acc = acc;
    saveProgress();
    state.screen = "summary"; render(); return;
  }

  const prevBadges = getEarnedBadgeIds(progress);
  const tiempoRaw = L.timeScores.length ? L.timeScores.reduce(function(a,b){return a+b;},0)/L.timeScores.length : 70;

  let stars = 0;
  if(!L.failed){
    if(acc>=1) stars=3; else if(acc>=0.8) stars=2; else if(acc>=0.6) stars=1; else stars=0;
    if(acc>=1) L.xpGained += 20;
    const rec = progress.modules[L.mod][L.lesson];
    rec.completed = true;
    rec.stars = Math.max(rec.stars, stars);
    rec.bestAcc = Math.max(rec.bestAcc, acc);
    progress.totalXP += L.xpGained;
    if(!progress.flags) progress.flags = {};
    if(acc>=1) progress.flags.hadPerfectLesson = true;
    if(acc>=1 && tiempoRaw>=100) progress.flags.hadFastPerfect = true;
    updateStreak();
  }

  const newBadges = getEarnedBadgeIds(progress).filter(function(id){ return prevBadges.indexOf(id)===-1; });
  L.newBadges = newBadges;
  L.stars = stars; L.acc = acc;

  saveProgress();
  state.screen = "summary";
  render();
}
function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(progress.lastCompletionDate === today) return;
  if(progress.lastCompletionDate){
    const diffDays = Math.round((new Date(today) - new Date(progress.lastCompletionDate)) / 86400000);
    progress.streak = diffDays===1 ? progress.streak + 1 : 1;
  } else { progress.streak = 1; }
  progress.lastCompletionDate = today;
}

/* ---------------- SUMMARY ---------------- */
function renderSummary(){
  const L = state.lesson;
  const total = L.queue.length;
  if(L.isReview){
    return '<div class="summary-wrap"><div class="summary-stamp">'+bigIcon(iconCheckHero(),'var(--blue-dark)')+'</div>'
      + '<h2 class="summary-title">Repaso completado</h2>'
      + '<div class="summary-sub">Conceptos revisados de tu lista pendiente</div>'
      + '<div class="summary-grid"><div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div>'
      + '<div class="summary-box"><div class="num">+'+L.xpGained+'</div><div class="lbl">XP ganado</div></div></div>'
      + '<button class="btn-primary" id="btn-tomap">Continuar</button></div>';
  }
  if(L.failed){
    return '<div class="summary-wrap"><div class="summary-stamp fail">'+bigIcon(iconXHero(),'var(--error)')+'</div>'
      + '<h2 class="summary-title">Lecci\u00f3n incompleta</h2>'
      + '<div class="summary-sub">Se agotaron tus 5 vidas en M'+L.mod+' \u00b7 Lecci\u00f3n '+L.lesson+'</div>'
      + '<div class="summary-grid"><div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div>'
      + '<div class="summary-box"><div class="num">'+(L.idx+1)+'/'+total+'</div><div class="lbl">Avanzado</div></div></div>'
      + '<button class="btn-primary" id="btn-retry">Reintentar lecci\u00f3n</button>'
      + '<button class="btn-ghost" id="btn-tomap">Volver al mapa</button></div>';
  }
  const badgesHtml = (L.newBadges&&L.newBadges.length) ? '<div class="badges-toast"><b>\ud83c\udfc5 Nueva(s) insignia(s)</b>'+L.newBadges.map(function(id){ return BADGES.find(function(b){return b.id===id;}).name; }).join(", ")+'</div>' : "";
  return '<div class="summary-wrap"><div class="summary-stamp">'+bigIcon(iconCheckHero(),'var(--green-dark)')+'</div>'
    + '<h2 class="summary-title">Lecci\u00f3n completada</h2>'
    + '<div class="summary-sub">M'+L.mod+' \u00b7 Lecci\u00f3n '+L.lesson+'</div>'
    + '<div class="summary-stars">'+[0,1,2].map(i=>iconStar(i<L.stars)).join("")+'</div>'
    + badgesHtml
    + '<div class="summary-grid"><div class="summary-box"><div class="num">'+Math.round(L.acc*100)+'%</div><div class="lbl">Precisi\u00f3n</div></div>'
    + '<div class="summary-box"><div class="num">+'+L.xpGained+'</div><div class="lbl">XP ganado</div></div>'
    + '<div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div></div>'
    + '<button class="btn-primary" id="btn-tomap">Continuar</button>'
    + '<button class="btn-ghost" id="btn-retry">Repasar de nuevo</button></div>';
}
function attachSummaryEvents(){
  const L = state.lesson;
  document.getElementById('btn-tomap').onclick = function(){ state.screen="map"; state.lesson=null; render(); };
  const retry = document.getElementById('btn-retry');
  if(retry) retry.onclick = function(){ if(L.isReview) startReviewLesson(); else startLesson(L.mod, L.lesson); };
}

loadProgress();
</script>
