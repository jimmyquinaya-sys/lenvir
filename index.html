onto económico de cada sanción ambiental.", "lesson": 2}, {"id": "CON-099", "mod": 5, "termino": "Subsanación Voluntaria", "options": ["Corrección del incumplimiento por parte del titular antes de que el OEFA notifique el inicio del procedimiento sancionador, evitando la multa.", "El cambio voluntario del contratista de obras por una empresa local elegida por votación de la comunidad del AID.", "El levantamiento de las observaciones técnicas al EIA dentro de los plazos improrrogables fijados por el Senace."], "correctIndex": 0, "feedback": "Corregir el incumplimiento ANTES de que OEFA notifique el inicio del PAS evita la multa; hacerlo después de notificado ya no califica como voluntario.", "lesson": 2}, {"id": "CON-100", "mod": 5, "termino": "Clausura Definitiva", "options": ["La culminación programada de las obras de construcción vial debido al cumplimiento del cronograma de ingeniería.", "El desmantelamiento de los campamentos temporales al finalizar la etapa de Línea de Base de un estudio ambiental.", "Sanción administrativa extrema que ordena el cierre permanente de las instalaciones o el cese total de las actividades del proyecto."], "correctIndex": 2, "feedback": "La clausura definitiva es la sanción más extrema: ordena el cierre permanente de instalaciones o el cese total de actividades del proyecto.", "lesson": 2}, {"id": "CON-101", "mod": 6, "termino": "DME", "options": ["Dispositivo de Medición de Efluentes, sensor digital utilizado en las cunetas de las carreteras.", "Depósito de Material Excedente; área autorizada en proyectos viales para la disposición final de tierras y rocas de excavación (cortes).", "Dirección de Monitoreo Ecológico, oficina encargada de fiscalizar las emisiones de los vehículos pesados."], "correctIndex": 1, "feedback": "El DME es el área autorizada dentro o cerca del derecho de vía para depositar el material excedente de los cortes; su ubicación y volumen deben quedar definidos en el instrumento ambiental.", "lesson": 1}, {"id": "CON-102", "mod": 6, "termino": "FITSA", "options": ["Fórmula de Impacto Territorial y Social Aplicada, algoritmo matemático usado en la Matriz de Leopold.", "Fondo de Inversión Técnico para la Supervisión Ambiental de la Amazonía Peruana.", "Ficha Técnica Socioambiental; instrumento de gestión ambiental simplificado para proyectos de transportes con impactos leves o moderados."], "correctIndex": 2, "feedback": "La FITSA reemplaza a la antigua Ficha Técnica Ambiental para proyectos viales menores sin impactos significativos, agilizando su trámite frente a un EIA-sd o EIA-d.", "lesson": 1}, {"id": "CON-103", "mod": 6, "termino": "MTC", "options": ["Ministerio de Transportes y Comunicaciones; autoridad competente que norma y aprueba los estudios ambientales de infraestructura vial y de transportes.", "Maquinaria de Transporte y Carga, denominación genérica para los camiones volquetes en obras.", "Manual Técnico de Carreteras, documento que establece exclusivamente los límites de velocidad permitidos en el país."], "correctIndex": 0, "feedback": "El MTC es la autoridad sectorial que norma y, a través de su unidad ambiental, certifica los estudios de proyectos de transportes y comunicaciones.", "lesson": 1}, {"id": "CON-104", "mod": 6, "termino": "DGAAM MTC", "options": ["Dirección General de Asuntos Ambientales de las Actividades de Transportes del MTC, encargada de evaluar y otorgar la certificación ambiental sectorial.", "Dirección de Gestión de Aguas Anómalas y Mineras, organismo adscrito a la Autoridad Nacional del Agua.", "Dispositivo General de Alerta Ambiental Municipal, utilizado en el control operativo de ruidos urbanos."], "correctIndex": 0, "feedback": "La DGAAM-MTC evalúa y aprueba los instrumentos de gestión ambiental del sector Transportes, y hoy también fiscaliza mientras no se transfiera esa función a OEFA.", "lesson": 1}, {"id": "CON-105", "mod": 6, "termino": "Derecho de Vía", "options": ["El permiso legal que otorga una comunidad para transitar de forma temporal por sus caminos ancestrales.", "La tasa económica que pagan los transportistas pesados al pasar por las estaciones de peaje interprovinciales.", "Faja de terreno de dominio público destinada a la construcción, mantenimiento, futuras ampliaciones y seguridad de una infraestructura vial."], "correctIndex": 2, "feedback": "El derecho de vía es la franja pública reservada para la vía y sus futuras ampliaciones; cualquier ocupación dentro de ella debe respetar las restricciones legales correspondientes.", "lesson": 1}, {"id": "CON-106", "mod": 6, "termino": "Cantera", "options": ["Yacimiento de materiales minerales no metálicos (piedra, arena, hormigón) utilizado para abastecer de agregados a las obras de infraestructura.", "La zona de amortiguamiento adyacente a un área natural protegida donde no se puede realizar desbroce.", "El almacén cerrado del campamento destinado exclusivamente al resguardo de las muestras biológicas colectadas."], "correctIndex": 0, "feedback": "Una cantera de materiales no metálicos puede operar sin concesión minera si es de uso exclusivo para la obra y está dentro del área autorizada, pero igual debe registrarse ante la autoridad minera.", "lesson": 1}, {"id": "CON-107", "mod": 6, "termino": "Campamento Temporal", "options": ["El centro de detención administrativa implementado por la policía ecológica para infractores ambientales.", "Una zona intangible de reforestación obligatoria establecida en el Plan de Cierre del sector transportes.", "Instalación provisional construida para el alojamiento del personal, oficinas, comedores y talleres mecánicos durante la ejecución de una obra."], "correctIndex": 2, "feedback": "El campamento temporal aloja al personal y equipos durante la obra, y debe contar con sus propias medidas de manejo de residuos, efluentes y contingencias dentro del IGA.", "lesson": 1}, {"id": "CON-108", "mod": 6, "termino": "Patio de Máquinas", "options": ["Área habilitada y acondicionada para el estacionamiento, mantenimiento preventivo y abastecimiento de combustible de la maquinaria pesada del proyecto.", "La losa deportiva construida por la empresa constructora como parte de su programa de relaciones comunitarias.", "El sistema de fajas transportadoras mecanizadas utilizado para movilizar agregados desde la cantera a la vía."], "correctIndex": 0, "feedback": "El patio de máquinas concentra el mayor riesgo de derrames de hidrocarburos en obra, por lo que requiere bandejas de contención y kits antiderrame siempre disponibles.", "lesson": 1}, {"id": "CON-109", "mod": 6, "termino": "Chancadora", "options": ["El sistema de compresión hidráulica utilizado para compactar los residuos peligrosos antes de su disposición.", "Un laboratorio móvil acreditado empleado para medir in situ la densidad de los suelos compactados.", "Planta o equipo mecánico destinado a la trituración y clasificación de las rocas extraídas de las canteras para su uso como agregados viales."], "correctIndex": 2, "feedback": "La chancadora genera ruido y material particulado significativos, por lo que su ubicación y horario de operación suelen estar sujetos a restricciones específicas del IGA.", "lesson": 1}, {"id": "CON-110", "mod": 6, "termino": "Planta de Asfalto", "options": ["Un dispositivo de control que mide el índice de rugosidad internacional (IRI) en la superficie de la carretera.", "El área designada para el lavado de los neumáticos de los camiones antes de ingresar a las vías urbanas.", "Instalación industrial temporal o fija utilizada para mezclar agregados y ligantes asfálticos, crítica por sus emisiones a la atmósfera."], "correctIndex": 2, "feedback": "La planta de asfalto es una de las fuentes de emisión más fiscalizadas de un proyecto vial por sus compuestos volátiles y material particulado.", "lesson": 1}, {"id": "CON-111", "mod": 6, "termino": "Planta de Concreto", "options": ["El almacén generalizado de insumos químicos fiscalizados por la SUNAT dentro de un proyecto vial.", "Infraestructura destinada a la dosificación y mezcla de cemento, agregados y agua, regulada por sus impactos en ruido y material particulado.", "El sistema de pozas de lixiviación empleado para recuperar minerales valiosos a partir de rocas trituradas."], "correctIndex": 1, "feedback": "La planta de concreto se regula principalmente por ruido y material particulado generado en la dosificación y mezcla de agregados.", "lesson": 2}, {"id": "CON-112", "mod": 6, "termino": "PVE", "options": ["Plan de Vigilancia Ambiental; programa del sector transportes enfocado en supervisar que las medidas de mitigación se apliquen eficazmente en obra.", "Protocolo de Vertidos Excepcionales, trámite que se realiza ante la ANA durante emergencies climáticas.", "Póliza de Viabilidad Ecológica, fianza bancaria obligatoria para iniciar la construcción de un puente."], "correctIndex": 0, "feedback": "El PVE verifica en campo que las medidas de mitigación comprometidas en el IGA realmente se estén ejecutando, no solo que existan en el papel.", "lesson": 2}, {"id": "CON-113", "mod": 6, "termino": "Zanja de Coronación", "options": ["El canal de drenaje principal de una planta de tratamiento de aguas residuales domésticas en el campamento.", "Canal de desviación construido en la parte alta de los taludes de corte para captar y evacuar el agua de escorrentía, evitando deslizamientos.", "Una excavación perimetral rellena de carbón activado para retener los vapores inflamables de los tanques de combustible."], "correctIndex": 1, "feedback": "La zanja de coronación intercepta el agua de escorrentía antes de que llegue al talud, reduciendo el riesgo de erosión y deslizamientos.", "lesson": 2}, {"id": "CON-114", "mod": 6, "termino": "Talud de Corte", "options": ["El muro de concreto armado construido para proteger los puentes contra las crecidas extraordinarias de los ríos.", "La pendiente natural de un cerro donde está estrictamente prohibido realizar cualquier tipo de obra civil.", "Superficie inclinada que resulta de las excavaciones en el terreno natural para dar paso a la plataforma de una carretera u obra vial."], "correctIndex": 2, "feedback": "El talud de corte resulta de excavar el terreno natural; su inestabilidad es una de las causas más comunes de deslizamientos en obras viales.", "lesson": 2}, {"id": "CON-115", "mod": 6, "termino": "Talud de Relleno", "options": ["Superficie inclinada que se forma al terraplenar o colocar material excedente compactado para nivelar la plataforma de la vía.", "El porcentaje de sedimentos acumulados en el fondo de una poza de sedimentación de aguas de escorrentía.", "La zona de disposición final de lodos deshidratados procedentes de las actividades de perforación diamantina."], "correctIndex": 0, "feedback": "El talud de relleno se forma al colocar y compactar material para nivelar la plataforma vial, y requiere su propio control de estabilidad.", "lesson": 2}, {"id": "CON-116", "mod": 6, "termino": "Desbroce y Limpieza", "options": ["La desinfección química de los talleres mecánicos para eliminar restos de aceites y grasas industriales.", "Operación inicial que consiste en el retiro de la capa vegetal y cobertura orgánica del suelo dentro del área de corte o explanación del proyecto.", "El retiro de lodos acumulados en las cunetas de las carreteras después de la temporada de lluvias intensas."], "correctIndex": 1, "feedback": "El desbroce retira la cobertura vegetal antes de excavar; su alcance debe limitarse estrictamente al área aprobada en el IGA para no generar impactos no evaluados.", "lesson": 2}, {"id": "CON-117", "mod": 6, "termino": "Top Soil", "options": ["El indicador internacional que mide el nivel de acidez de los suelos agrícolas expuestos a lluvia ácida.", "Capa superficial del suelo (tierra orgánica o vegetal) que es retirada y almacenada en rumas bajas para su posterior uso en la reconformación.", "El software cartográfico oficial utilizado por el MTC para trazar las coordenadas del derecho de vía."], "correctIndex": 1, "feedback": "El top soil concentra la materia orgánica y semillas del suelo original; conservarlo correctamente es clave para una revegetación exitosa después de la obra.", "lesson": 2}, {"id": "CON-118", "mod": 6, "termino": "Ruma de Top Soil", "options": ["Almacenamiento temporal de suelo orgánico que no debe superar los dos metros de altura para mantener viables los microorganismos y semillas.", "El área designada para el acopio de madera comercial talada durante las operaciones de desbroce en selva.", "La fosa común autorizada para la disposición de animales silvestres atropellados en la red vial nacional."], "correctIndex": 0, "feedback": "Apilar el top soil a más de dos metros de altura puede matar a los microorganismos y semillas que se necesitan para revegetar después.", "lesson": 2}, {"id": "CON-119", "mod": 6, "termino": "Control de Polvo por Regado", "options": ["Aplicación periódica de agua mediante camiones cisterna sobre las vías no pavimentadas para mitigar el levantamiento de material particulado.", "El lavado a presión de la maquinaria pesada para evitar la propagación de semillas de especies invasoras.", "El sistema de aspersión instalado sobre las chimeneas de la planta de asfalto para capturar los gases."], "correctIndex": 0, "feedback": "El regado con cisternas es la medida más común para mitigar el material particulado en vías afirmadas durante la etapa de construcción.", "lesson": 2}, {"id": "CON-120", "mod": 6, "termino": "Señalización Ambiental", "options": ["Instalación de paneles informativos y preventivos en la obra para delimitar áreas sensibles, velocidad máxima y prohibición de caza.", "El pintado de las estructuras de concreto de los puentes con aditivos químicos reflectivos ecológicos.", "El sistema de balizas luminosas utilizadas para ahuyentar a las aves silvestres de las líneas de transmisión."], "correctIndex": 0, "feedback": "La señalización ambiental informa y previene, delimitando áreas sensibles y restricciones (como la prohibición de caza) dentro y cerca de la obra.", "lesson": 2}, {"id": "CON-121", "mod": 6, "termino": "Monitoreo de Vibraciones", "options": ["Medición del movimiento oscilatorio del suelo mediante geófonos para asegurar que las voladuras o maquinaria no dañen estructuras o fauna.", "La evaluación periódica del desgaste de los neumáticos de los camiones volquetes para reducir la chatarra.", "El registro sísmico continuo que realiza el Instituto Geofísico del Perú en las zonas de alta montaña."], "correctIndex": 0, "feedback": "El monitoreo de vibraciones previene daños a estructuras o fauna sensible cuando hay voladuras o maquinaria pesada operando cerca.", "lesson": 3}, {"id": "CON-122", "mod": 6, "termino": "Geófono", "options": ["El equipo digital empleado para detectar la presencia de tuberías de agua subterránea antes de excavar.", "Instrumento técnico de campo utilizado para registrar la velocidad de onda sísmica y la magnitud de las vibraciones en una zona de obra.", "El sensor ultrasónico que mide la profundidad del nivel freático en los pozos de monitoreo hidrogeológico."], "correctIndex": 1, "feedback": "El geófono capta la velocidad de la onda sísmica generada por una voladura o maquinaria, permitiendo verificar que no se superen los límites de seguridad.", "lesson": 3}, {"id": "CON-123", "mod": 6, "termino": "Cuneta de Coronación", "options": ["La fosa de lodos construida en la base de las canteras para retener los sedimentos gruesos por gravedad.", "Estructura hidráulica de conducción paralela a la vía destinada a colectar las aguas de lluvia provenientes de los taludes superiores.", "El canal de concreto que rodea el patio de máquinas para capturar los aceites y grasas de los lavados."], "correctIndex": 1, "feedback": "La cuneta de coronación conduce el agua de los taludes superiores de forma controlada, evitando que erosione la plataforma vial.", "lesson": 3}, {"id": "CON-124", "mod": 6, "termino": "Alcantarilla", "options": ["Estructura de drenaje transversal que permite el paso del agua de cauces naturales o cunetas a través del cuerpo de la carretera.", "La planta de tratamiento compacta utilizada para potabilizar el agua captada de los manantiales locales.", "El túnel técnico subterráneo empleado para el tendido de redes de fibra óptica y comunicaciones en ciudades."], "correctIndex": 0, "feedback": "La alcantarilla permite que el agua de un cauce natural cruce por debajo de la vía sin interrumpir el flujo hidráulico original.", "lesson": 3}, {"id": "CON-125", "mod": 6, "termino": "Badén", "options": ["Estructura de protección vial construida en el cauce de un río o quebrada para permitir el paso de flujos de agua excepcionales sobre la vía.", "La barrera acústica de hormigón que se instala en los perímetros de las plantas de asfalto para mitigar el ruido.", "El canal de tierra utilizado para desviar el curso de un río mientras se ejecutan los estribos de un puente."], "correctIndex": 0, "feedback": "El badén permite que un flujo de agua excepcional (como una avenida) pase sobre la vía sin destruirla, a diferencia de una alcantarilla diseñada para flujos regulares.", "lesson": 3}, {"id": "CON-126", "mod": 6, "termino": "Reconformación Morfológica", "options": ["El proceso de nivelación del suelo mediante el uso de motoniveladoras antes de colocar la carpeta asfáltica.", "Acción de ingeniería destinada a devolver al terreno (como un DME o cantera agotada) formas suaves y estables integradas al paisaje natural.", "La demolición total de las viviendas ubicadas dentro del derecho de vía que no cuentan con título de propiedad."], "correctIndex": 1, "feedback": "La reconformación morfológica busca integrar visualmente un DME o cantera agotada al paisaje circundante, suavizando sus formas artificiales.", "lesson": 3}, {"id": "CON-127", "mod": 6, "termino": "Estabilidad Física", "options": ["El equilibrio químico de las aguas residuales industriales tratadas antes de ser vertidas a un río receptor.", "La capacidad de la empresa constructora para mantener sus operaciones activas sin ingresar a crisis financiera.", "Condición del terreno u obras de ingeniería (como taludes y depósitos) que garantiza que no sufrirán deslizamientos, fallas o colapsos."], "correctIndex": 2, "feedback": "La estabilidad física se refiere a que un talud o depósito no colapse ni se deslice; es uno de los dos pilares, junto a la estabilidad química, del cierre de componentes mineros y de DME.", "lesson": 3}, {"id": "CON-128", "mod": 6, "termino": "Estabilidad Química", "options": ["Condición que asegura que los materiales depositados (como desmontes o relaves) no generarán efluentes tóxicos o ácidos con el tiempo.", "La resistencia estructural del asfalto frente a los cambios extremos de temperatura en zonas altoandinas.", "El mantenimiento del pH neutro en las pozas de captación de agua potable para el consumo del campamento."], "correctIndex": 0, "feedback": "La estabilidad química asegura que un depósito de materiales no siga generando efluentes contaminantes con el paso del tiempo, incluso después de cerrado.", "lesson": 3}, {"id": "CON-129", "mod": 6, "termino": "PACRI", "options": ["Protocolo de Acreditación de Consultoras de Riesgo Industrial, registro administrado por el Ministerio de la Producción.", "Plan de Compensación y Reasentamiento Involuntario; programa aplicable cuando un proyecto vial desplaza físicamente a poblaciones o comercios.", "Plataforma de Alertas Críticas por Recursos Hídricos Incautados, sistema informático de la ANA."], "correctIndex": 1, "feedback": "El PACRI se activa cuando una obra desplaza físicamente viviendas o negocios, y debe garantizar una compensación justa antes del desplazamiento.", "lesson": 3}, {"id": "CON-130", "mod": 6, "termino": "Paso de Fauna", "options": ["La trocha carrozable temporal utilizada por los camiones de la obra para no sature las vías públicas principales.", "Estructura de ingeniería (túnel o puente verde) diseñada para permitir el tránsito seguro de animales silvestres, evitando el atropello y fragmentación.", "La tranquera de control donde los guardaparques del SERNANP fiscalizan el ingreso de cazadores a las ANP."], "correctIndex": 1, "feedback": "Un paso de fauna reduce la fragmentación del hábitat causada por la vía, permitiendo que los animales sigan cruzando con seguridad.", "lesson": 3}, {"id": "CON-131", "mod": 6, "termino": "Barrera Acústica", "options": ["La campaña de concientización comunitaria orientada a reducir el uso excesivo de bocinas en zonas escolares.", "El uso obligatorio de tapones auditivos endoaurales por parte de los operadores de la planta de concreto.", "Estructura rígida (muro, pantalla o berma) instalada entre la fuente de ruido (vía, planta) y los receptores sensibles para atenuar los decibeles."], "correctIndex": 2, "feedback": "Una barrera acústica se coloca entre la fuente de ruido y los receptores sensibles, como una escuela, para atenuar el nivel de decibeles que les llega.", "lesson": 4}, {"id": "CON-132", "mod": 6, "termino": "Polímero Estabilizador", "options": ["El reactivo biológico empleado en las plantas de tratamiento para acelerar la floculación de la materia orgánica.", "Aditivo químico ecológico aplicado al suelo o afirmado de las vías para aglomerar las partículas finas y suprimir de forma duradera el polvo.", "El componente plástico utilizado para revestir el fondo de las pozas de lixiviación en proyectos mineros."], "correctIndex": 1, "feedback": "El polímero estabilizador aglomera las partículas finas del afirmado, suprimiendo el polvo de forma más duradera que el simple regado con agua.", "lesson": 4}, {"id": "CON-133", "mod": 6, "termino": "Trocha de Acceso", "options": ["Vía de comunicación temporal y de sección reducida construida para movilizar equipos hacia puntos específicos (como estaciones o frentes de obra).", "El camino peatonal señalizado utilizado por las comunidades locales para asistir a los talleres informativos.", "La línea limítrofe que separa el área de influencia directa del proyecto del área de influencia indirecta."], "correctIndex": 0, "feedback": "Una trocha de acceso es una vía temporal y angosta para llegar a un frente de obra específico, distinta de la vía principal del proyecto.", "lesson": 4}, {"id": "CON-134", "mod": 6, "termino": "Desmantelamiento", "options": ["Etapa del Plan de Cierre que consiste en la demolición y retiro ordenado de todas las estructuras temporales introducidas por el proyecto.", "La suspensión inmediata de las actividades de desbroce por orden directa de un inspector forestal del SERFOR.", "El proceso de calibración y limpieza profunda de los muestreadores de aire de alto volumen (Hi-Vol)."], "correctIndex": 0, "feedback": "El desmantelamiento retira las estructuras temporales (campamentos, plantas) al cerrar el proyecto, dejando el área lista para su reconformación final.", "lesson": 4}, {"id": "CON-135", "mod": 6, "termino": "Cierre Progresivo", "options": ["Actividades de remediación y cierre que se ejecutan de forma simultánea al desarrollo del proyecto sobre áreas que ya quedaron liberadas o agotadas.", "La paralización temporal de las operaciones de una planta industrial dispuesta por el OEFA tras una infracción grave.", "La clausura definitiva de un botadero municipal mediante la colocación de capas de arcilla y cobertura vegetal."], "correctIndex": 0, "feedback": "El cierre progresivo remedia áreas ya agotadas mientras el proyecto sigue en ejecución, en vez de esperar hasta el final de toda la obra.", "lesson": 4}, {"id": "CON-136", "mod": 7, "termino": "MVCS", "options": ["Marco de Vigilancia de Ciudades Sostenibles, programa de certificación de municipios ecoeficientes.", "Manual de Viabilidad del Componente Social, guía metodológica para el levantamiento de líneas de base socioeconómicas.", "Ministerio de Vivienda, Construcción y Saneamiento; autoridad competente que evalúa los impactos ambientales de proyectos urbanos y de agua potable."], "correctIndex": 2, "feedback": "El MVCS evalúa los estudios ambientales de proyectos de habilitación urbana, saneamiento y edificaciones, en paralelo a lo que hace el MTC en vías.", "lesson": 1}, {"id": "CON-137", "mod": 7, "termino": "PTAR", "options": ["Planta de Tratamiento de Aguas Residuales; infraestructura diseñada para remover los contaminantes de las aguas servidas antes de su vertido o reúso.", "Plan de Tolerancia Ambiental de Residuos, documento que fija las metas anuales de reciclaje municipal.", "Plataforma Técnica de Alertas de Ruido, sistema informático utilizado por las municipalidades metropolitanas."], "correctIndex": 0, "feedback": "La PTAR remueve los contaminantes del agua servida antes de verterla o reutilizarla; sin ella, las aguas residuales llegarían crudas al cuerpo receptor.", "lesson": 1}, {"id": "CON-138", "mod": 7, "termino": "PTAP", "options": ["Plan de Tratamiento de Aguas de Perforación, utilizado de forma exclusiva en la actividad minero-metalúrgica.", "Planta de Tratamiento de Agua Potable; instalación que aplica procesos físicos y químicos para adecuar el agua cruda al consumo humano seguro.", "Protocolo de Transparencia Ambiental de Proyectos, portal público donde se publican los estudios del Senace."], "correctIndex": 1, "feedback": "La PTAP transforma agua cruda, de río, pozo o manantial, en agua segura para consumo humano mediante procesos físicos y químicos.", "lesson": 1}, {"id": "CON-139", "mod": 7, "termino": "Lodos Activados", "options": ["Un aditivo orgánico empleado para acelerar la esatbilización de los taludes de corte en obras de carreteras.", "Proceso biológico de tratamiento de aguas residuales que utiliza microorganismos suspendidos y aireación para degradar la materia orgánica.", "El sedimento altamente peligroso acumulado en el fondo de los tanques de almacenamiento de hidrocarburos volátiles."], "correctIndex": 1, "feedback": "Los lodos activados son el proceso biológico más común en una PTAR: microorganismos suspendidos que degradan la materia orgánica con ayuda de aireación.", "lesson": 1}, {"id": "CON-140", "mod": 7, "termino": "DDA", "options": ["Documentación de Daños Ambientales, formato de denuncia pericial utilizado ante la fiscalía especializada en materia ambiental.", "Dirección de Desarrollo Ambiental, oficina técnica adscrita al Ministerio del Ambiente que regula los plásticos.", "Disposición De Aguas; el acto formal de verter efluentes tratados en un cuerpo receptor (río, lago, mar) bajo parámetros de la ANA."], "correctIndex": 2, "feedback": "La DDA es el acto formal y autorizado de verter un efluente tratado en un río, lago o mar, bajo los parámetros que fija la ANA.", "lesson": 1}, {"id": "CON-141", "mod": 7, "termino": "Reuso de Aguas", "options": ["Utilización de aguas residuales debidamente tratadas para fines específicos como riego de áreas verdes, lavado de vías o procesos industriales.", "El bombeo directo de aguas sin tratar hacia los acuíferos subterráneos para mantener el nivel de la napa freática.", "El proceso de comercialización de aguas residuales domésticas crudas a las asociaciones agrarias locales."], "correctIndex": 0, "feedback": "Reusar aguas tratadas, para riego o lavado de vías por ejemplo, reduce la presión sobre fuentes de agua limpia, pero requiere su propia autorización.", "lesson": 1}, {"id": "CON-142", "mod": 7, "termino": "Cloración", "options": ["El método de estabilización de suelos arcillosos mediante la mezcla de cal viva y polímeros sintéticos en vías.", "La aplicación de solventes químicos industriales para disolver las costras de grasa en las tuberías de alcantarillado.", "Proceso químico de desinfección mediante la adición de cloro o compuestos clorados al agua para eliminar microorganismos patógenos."], "correctIndex": 2, "feedback": "La cloración es el método de desinfección más usado para eliminar microorganismos patógenos del agua antes de su distribución o vertido.", "lesson": 1}, {"id": "CON-143", "mod": 7, "termino": "Trampa de Grasas", "options": ["El muro perimetral de contención física construido alrededor de los depósitos de almacenamiento de combustibles.", "Dispositivo hidráulico de retención diseñado para separar por flotación los aceites y grasas del agua residual de cocinas o talleres antes del drenaje.", "El equipo de laboratorio empleado para medir la concentración de lípidos en muestras de tejido de fauna silvestre."], "correctIndex": 1, "feedback": "La trampa de grasas separa por flotación los aceites del agua residual antes de que lleguen al sistema de drenaje, evitando obstrucciones y contaminación.", "lesson": 1}, {"id": "CON-144", "mod": 7, "termino": "Sedimentador", "options": ["El sensor digital que mide el grado de opacidad de los humos emitidos por las chimeneas de las plantas industriales.", "Tanque o estructura diseñada para reducir la velocidad del agua y permitir que los sólidos suspendidos caigan al fondo por gravedad.", "Una barrera de madera instalada en los cauces de los ríos para frenar el paso de especies biológicas invasoras."], "correctIndex": 1, "feedback": "El sedimentador reduce la velocidad del agua para que los sólidos suspendidos se asienten por gravedad antes de continuar el tratamiento.", "lesson": 1}, {"id": "CON-145", "mod": 7, "termino": "Cámara de Rejas", "options": ["El dispositivo técnico utilizado para la captura y conteo de murciélagos durante la evaluación biológica de campo.", "Estructura inicial de una PTAR encargada de retener mecánicamente los sólidos gruesos (basura, plásticos, trapos) mediante barras metálicas.", "La zona de almacenamiento seguro de explosivos e insumos químicos fiscalizados dentro de un proyecto minero."], "correctIndex": 1, "feedback": "La cámara de rejas es la primera etapa de una PTAR: retiene mecánicamente los sólidos gruesos antes de que dañen los equipos siguientes.", "lesson": 1}, {"id": "CON-146", "mod": 7, "termino": "DBO5", "options": ["Dirección de Bosques y Ordenamiento Territorial, oficina del SERFOR encargada del catastro forestal nacional.", "Demanda Bioquímica de Oxígeno a los 5 días; parámetro que mide la cantidad de oxígeno consumido al degradar biológicamente la materia orgánica del agua.", "Dispositivo de Control Biológico de Suelos, formato de inspección de la capa orgánica del sector agricultura."], "correctIndex": 1, "feedback": "La DBO5 mide cuánto oxígeno consumen los microorganismos al degradar la materia orgánica en 5 días; a mayor DBO5, más contaminada está el agua.", "lesson": 2}, {"id": "CON-147", "mod": 7, "termino": "DQO", "options": ["Dispositivo Químico de Oxigenación, equipo utilizado para rescatar fauna acuática ante eventos de derrames.", "Dirección de Calidad Operativa, oficina del INACAL encargada de sancionar a los laboratorios privados sin vigencia.", "Demanda Química de Oxígeno; parámetro que mide la cantidad de oxígeno requerido para oxidar químicamente la materia orgánica e inorgánica del agua."], "correctIndex": 2, "feedback": "La DQO mide el oxígeno necesario para oxidar toda la materia orgánica e inorgánica presente, no solo la biodegradable como la DBO5.", "lesson": 2}, {"id": "CON-148", "mod": 7, "termino": "SST Agua", "options": ["Sistema de Supervisión del Top Soil, software empleado por el Ministerio de Desarrollo Agrario y Riego.", "Sólidos Suspendidos Totales en agua; partículas atrapadas en el recurso hídrico que no se sedimentan fácilmente y que afectan su turbidez y calidad.", "Esquema de Seguridad Territorial, plan de contingencias corporativo contra robos de materiales en obras viales."], "correctIndex": 1, "feedback": "Los SST son las partículas suspendidas que afectan la turbidez del agua; valores altos pueden afectar la vida acuática y la calidad del recurso.", "lesson": 2}, {"id": "CON-149", "mod": 7, "termino": "Coliformes Termotolerantes", "options": ["Microorganismos benéficos utilizados en la biorremediación de suelos impactados por metales pesados en minería.", "Especies biológicas indicadoras de la calidad del aire en zonas urbanas de alta densidad vehicular.", "Bacterias indicadoras de contaminación fecal en el agua, críticas para evaluar la aptitud del recurso para consumo o riego."], "correctIndex": 2, "feedback": "Los coliformes termotolerantes indican contaminación fecal en el agua; su presencia es crítica para decidir si el recurso es apto para consumo o riego.", "lesson": 2}, {"id": "CON-150", "mod": 8, "termino": "SIGERSOL", "options": ["Sindicato de Ingenieros de Gestión de Residuos Sólidos de la República del Perú.", "Sistema de Información para la Gestión de Residuos Sólidos; plataforma oficial del MINAM para el reporte obligatorio de manifiestos y declaraciones.", "Sistema de Alertas Geográficas de Residuos Sólidos e Inundaciones de la Costa Andina."], "correctIndex": 1, "feedback": "El SIGERSOL es la plataforma oficial donde se reportan obligatoriamente los manifiestos y declaraciones de manejo de residuos sólidos.", "lesson": 1}, {"id": "CON-151", "mod": 8, "termino": "Manifiesto de Residuos", "options": ["La declaración pública que realiza una empresa comunitaria aceptando los términos económicos del proyecto vial.", "El informe anual donde la empresa detalla el inventario de todas las maquinarias y camiones dados de baja.", "Documento técnico-legal que registra de forma detallada la cadena de custodia del transporte y disposición final de residuos peligrosos."], "correctIndex": 2, "feedback": "El manifiesto documenta toda la cadena de custodia de un residuo peligroso, desde que se genera hasta su disposición final.", "lesson": 1}, {"id": "CON-152", "mod": 8, "termino": "Plan de Minimizacion y Gestion", "options": ["Documento obligatorio donde el titular detalla las estrategias para reducir la generación de residuos y asegurar su manejo seguro.", "El presupuesto asignado para la reducción de puestos de trabajo al finalizar la etapa de construcción de la obra.", "El trámite administrativo requerido para solicitar la exoneración del pago de arbitrios municipales de limpieza."], "correctIndex": 0, "feedback": "Este plan detalla cómo el titular reducirá la generación de residuos y garantizará su manejo seguro durante todo el proyecto.", "lesson": 1}, {"id": "CON-153", "mod": 8, "termino": "Residuo Incompatible", "options": ["Un material descartado que no puede ser reciclado debido a que ha superado el año de antigüedad en almacén.", "Aquel que al entrar en contacto con otro residuo puede generar reacciones violentas, gases tóxicos, calor extremo o explosiones.", "Los restos de herramientas y repuestos mecánicos que no corresponden a la marca de las maquinarias de la obra."], "correctIndex": 1, "feedback": "Mezclar residuos incompatibles puede generar reacciones violentas o gases tóxicos; por eso la segregación correcta es tan crítica como la disposición final.", "lesson": 1}, {"id": "CON-154", "mod": 8, "termino": "Reciclaje", "options": ["El entierro sanitario de botellas y envases de vidrio dentro de los taludes de corte de las carreteras viales.", "Proceso de transformación de los residuos sólidos segregados para reincorporarlos como materia prima en ciclos productivos.", "La quema de cartones y plásticos para utilizarlos como combustible secundario en las calderas de la planta."], "correctIndex": 1, "feedback": "Reciclar transforma un residuo segregado en materia prima para un nuevo ciclo productivo, distinto de simplemente almacenarlo o quemarlo.", "lesson": 1}, {"id": "CON-155", "mod": 8, "termino": "Compostaje", "options": ["Proceso biológico aeróbico de descomposición de la materia orgánica segregada para la obtención de abono natural (compost).", "La acumulación de lodos cloacales crudos en las cercanías de los ríos para favorecer la fertilidad de las orillas.", "El método de tratamiento térmico utilizado para destruir los residuos hospitalarios o médicos del campamento."], "correctIndex": 0, "feedback": "El compostaje degrada biológicamente la materia orgánica de forma aeróbica para producir abono, sin necesidad de procesos térmicos.", "lesson": 1}, {"id": "CON-156", "mod": 8, "termino": "Hoja MSDS", "options": ["Manual de Supervisión de Daños Sociales, guía de campo utilizada por los relacionistas comunitarios del MTC.", "Matriz de Selección de Destinos de Suelos, software cartográfico empleado para delimitar la ubicación de los DME.", "Ficha de Datos de Seguridad de Materiales; documento obligatorio que detalla los riesgos, manejo seguro y primeros auxilios ante sustancias químicas."], "correctIndex": 2, "feedback": "La hoja MSDS detalla los riesgos y el manejo seguro de una sustancia química; debe estar disponible donde se almacenen o usen esos insumos.", "lesson": 1}, {"id": "CON-157", "mod": 8, "termino": "Kit Antiderrame", "options": ["El sistema de boyas flotantes instalado en los ríos para impedir el tránsito de embarcaciones no autorizadas.", "El maletín de primeros auxilios médicos que llevan los ingenieros de SST en las camionetas de supervisión.", "Conjunto de materiales absorbentes (paños, salchichas, bandejas) de uso obligatorio en el patio de máquinas para contener fugas de hidrocarburos."], "correctIndex": 2, "feedback": "El kit antiderrame debe estar siempre disponible en el patio de máquinas para contener una fuga de hidrocarburos antes de que llegue al suelo o a un cuerpo de agua.", "lesson": 1}, {"id": "CON-158", "mod": 8, "termino": "Bandeja de Contención", "options": ["El almacén techado destinado al resguardo de las hojas MSDS y los registros de capacitación ambiental.", "Estructura metálica o de polietileno colocada debajo de los equipos estáticos o motores para capturar goteos accidentales de aceite o combustible.", "La plataforma de concreto utilizada para realizar el lavado a presión de los neumáticos de los camiones volquetes."], "correctIndex": 1, "feedback": "La bandeja de contención captura los goteos de aceite o combustible de un equipo estático, evitando que contaminen el suelo debajo.", "lesson": 1}, {"id": "CON-159", "mod": 8, "termino": "Punto de Acopio", "options": ["Lugar señalizado y equipado con contenedores diferenciados por colores para la segregación inicial de los residuos sólidos en la obra.", "La oficina comunal donde los ciudadanos se reúnen para revisar el Resumen Ejecutivo del estudio ambiental.", "La estación de pesaje obligatoria donde los camiones de carga registran el peso neto de los materiales agregados."], "correctIndex": 0, "feedback": "El punto de acopio es donde se segregan inicialmente los residuos por colores, antes de su traslado al almacenamiento temporal o disposición final.", "lesson": 1}, {"id": "CON-160", "mod": 8, "termino": "Aprovechamiento de Residuos", "options": ["El almacenamiento indefinido de materiales inservibles en los patios de máquinas para su posterior venta como chatarra.", "La quema abierta de plásticos y neumáticos para generar calor en campamentos altoandinos durante el friaje.", "Volver a utilizar un residuo mediante procesos como la reutilización, reciclaje, compostaje o recuperación energética, reduciendo la disposición final."], "correctIndex": 2, "feedback": "Aprovechar un residuo, reutilizándolo, reciclándolo o compostándolo, reduce lo que finalmente termina en un relleno, a diferencia de solo almacenarlo o quemarlo.", "lesson": 2}, {"id": "CON-161", "mod": 8, "termino": "RCD", "options": ["Registro Central de Daños, base de datos del OEFA donde se anotan los desastres ambientales de gran magnitud.", "Reglamento de Control de Detonaciones, norma del sector minería que regula el uso técnico de explosivos.", "Residuos de Construcción y Demolición; generados en las actividades de obras civiles y edificaciones (concreto, ladrillos, desmonte), regulados por el MVCS."], "correctIndex": 2, "feedback": "Los RCD (escombros, concreto, ladrillos) tienen su propia normativa de manejo dentro del sector Vivienda, distinta de los residuos peligrosos industriales.", "lesson": 2}, {"id": "CON-162", "mod": 8, "termino": "Decreto Leg 1278", "options": ["Decreto que unifica los criterios de tasación predial aplicables a los reasentamientos humanos del PACRI.", "Ley de Gestión Integral de Residuos Sólidos en el Perú, norma vigente que prioriza la minimización, valorización y la economía circular.", "Ley General de la Autoridad Nacional del Agua que regula los cánones y derechos de uso del recurso hídrico."], "correctIndex": 1, "feedback": "El D.Leg. 1278 es la norma marco de residuos sólidos en el Perú, que prioriza minimizar y valorizar antes que simplemente disponer.", "lesson": 2}, {"id": "CON-163", "mod": 8, "termino": "Botadero", "options": ["El almacén temporal de materiales de construcción ubicado dentro del derecho de vía de una carretera nacional.", "Acumulación informal e ilegal de residuos sólidos sin criterios técnicos ni sanitarios, que genera vectores, lixiviados y gases de efecto invernadero.", "El área autorizada dentro de un proyecto vial diseñada para la disposición final de los suelos orgánicos (Top Soil)."], "correctIndex": 1, "feedback": "Un botadero es informal e ilegal por definición; no debe confundirse con un relleno sanitario o de seguridad, que sí cumplen estándares técnicos.", "lesson": 2}, {"id": "CON-164", "mod": 8, "termino": "Capa de Cobertura", "options": ["La capa de asfalto flexible que sella la superficie de una carretera al concluir los trabajos de terraplenado.", "Capa de tierra de espesor controlado que se coloca diariamente sobre los residuos en un relleno sanitario para evitar olores y vectores.", "La geomembrana plástica que se instala debajo de los depósitos de material excedente para frenar la humedad."], "correctIndex": 1, "feedback": "La capa de cobertura diaria en un relleno sanitario evita que los residuos generen olores y atraigan vectores mientras se sigue operando el relleno.", "lesson": 2}, {"id": "CON-165", "mod": 8, "termino": "Vector", "options": ["La coordenada UTM utilizada para fijar los límites perimetrales del área de influencia directa del proyecto.", "El indicador matemático que define la dirección y velocidad del viento en las estaciones de monitoreo de aire.", "Organismo vivo (moscas, roedores, mosquitos) capaz de transmitir enfermedades, que prolifera en botaderos y malos almacenamientos de residuos."], "correctIndex": 2, "feedback": "Un vector (mosca, roedor) transmite enfermedades y prolifera donde los residuos no se manejan con criterios técnicos y sanitarios adecuados.", "lesson": 2}, {"id": "CON-166", "mod": 9, "termino": "MINEM", "options": ["Ministerio de Energía y Minas; autoridad competente encargada de dictar las políticas ambientales y evaluar estudios en minería e hidrocarburos.", "Marco Internacional de Inversiones Mineras y Energéticas Sostenibles, convenio suscrito por el Perú.", "Manual de Inspección de Efluentes Mineros, guía técnica de fiscalización utilizada exclusivamente por el OEFA."], "correctIndex": 0, "feedback": "El MINEM dicta la política ambiental del sector minero-energético y, a través de su unidad ambiental, evalúa los estudios de ese sector.", "lesson": 1}, {"id": "CON-167", "mod": 9, "termino": "DGAAM Minería", "options": ["Dispositivo General de Alertas Ambientales y Metalúrgicas, sensor de emisiones de fundiciones.", "Dirección de Gestión de Aguas Ácidas y Metales, oficina de asesoría técnica dependiente de la ANA.", "Dirección General de Asuntos Ambientales Mineros del MINEM, encargada de evaluar y normar los aspectos ambientales del sector minero."], "correctIndex": 2, "feedback": "La DGAAM del MINEM, distinta de la del MTC, es la que evalúa y norma los aspectos ambientales específicos de la actividad minera.", "lesson": 1}, {"id": "CON-168", "mod": 9, "termino": "DGAE", "options": ["Dirección de Gestión Ambiental Escolar, programa educativo desarrollado conjuntamente con el MINEDU.", "Dispositivo de Control de Emisiones Eléctricas, aislador empleado en las subestaciones de potencia.", "Dirección General de Asuntos Ambientales de Electricidad del MINEM, sector encargado de evaluar estudios de líneas de transmisión y centrales."], "correctIndex": 2, "feedback": "La DGAE evalúa los estudios ambientales de electricidad: líneas de transmisión, subestaciones y centrales de generación.", "lesson": 1}, {"id": "CON-169", "mod": 9, "termino": "Relave", "options": ["Desecho mineral sólido y líquido resultante del procesamiento metalúrgico de los minerales, almacenado de forma segura en presas o depósitos.", "El suelo orgánico de alta calidad que se retira durante el desbroce y que se almacena para la reconformación.", "El efluente doméstico debidamente tratado procedente de las duchas y lavaderos del campamento minero."], "correctIndex": 0, "feedback": "El relave es el desecho del procesamiento metalúrgico, distinto del desmonte, que es roca estéril sin procesar; ambos requieren depósitos seguros.", "lesson": 1}, {"id": "CON-170", "mod": 9, "termino": "Presa de Relaves", "options": ["Estructura de ingeniería hidráulica diseñada para el almacenamiento seguro y definitivo de los relaves, crítica por su estabilidad física.", "El canal de desviación de aguas de escorrentía construido alrededor de los talleres mecánicos del proyecto.", "La fosa de lixiviación empleada para disolver el mineral triturado mediante la aplicación de cianuro de sodio."], "correctIndex": 0, "feedback": "La presa de relaves es una de las estructuras más críticas en minería: su falla puede causar desastres ambientales de gran magnitud, por eso su estabilidad física se monitorea constantemente.", "lesson": 1}, {"id": "CON-171", "mod": 9, "termino": "Aguas Ácidas", "options": ["Las aguas residuales tratadas en una PTAR que presentan un exceso de cloro libre tras la desinfección.", "Efluentes con bajo pH y alta concentración de metales disueltos, generados por la oxidación natural de minerales sulfurados expuestos al aire y agua.", "El agua potable que ha sufrido una disminución de su temperatura debido a factores climáticos altoandinos."], "correctIndex": 1, "feedback": "Las aguas ácidas se generan naturalmente cuando minerales sulfurados quedan expuestos al aire y agua; su tratamiento es uno de los mayores retos ambientales de la minería.", "lesson": 1}, {"id": "CON-172", "mod": 9, "termino": "Efluente Industrial", "options": ["El caudal de agua subterránea que brota de forma natural a través de un manantial en la zona de influencia.", "Descarga líquida resultante de los procesos productivos, metalúrgicos o industriales de un proyecto, obligada a cumplir con LMP específicos.", "El agua de lluvia que escurre libremente por las laderas de los cerros sin entrar en contacto con la obra."], "correctIndex": 1, "feedback": "Un efluente industrial debe cumplir LMP específicos antes de su vertido, sin importar si proviene de un proceso metalúrgico, químico o de otra industria.", "lesson": 1}, {"id": "CON-173", "mod": 9, "termino": "Plan de Minado", "options": ["El cronograma de contratación de mano de obra local coordinado con las comunidades del área de influencia.", "El manual de seguridad que establece los procedimientos de evacuación en caso de derrumbes dentro de la mina.", "Documento técnico-operativo que detalla la secuencia de excavación, extracción y manejo de materiales en una operación minera a tajo abierto o subterránea."], "correctIndex": 2, "feedback": "El plan de minado define técnicamente cómo y en qué secuencia se extraerá el mineral, base para evaluar los impactos ambientales asociados.", "lesson": 1}, {"id": "CON-174", "mod": 9, "termino": "Desmonte de Mina", "options": ["Roca estéril o material con leyes de mineral inferiores al límite económico que es retirado para acceder al cuerpo mineralizado y se dispone en botaderos.", "Los residuos peligrosos generados en los laboratorios químicos de análisis de muestras minerales.", "El material vegetal desbrozado durante la limpieza inicial del terreno que es triturado para hacer compost."], "correctIndex": 0, "feedback": "El desmonte es roca sin valor económico que se retira para lle /* ---------------- almacenamiento (Claude o localStorage de respaldo) ---------------- */
const HAS_CLAUDE_STORAGE = (typeof window.storage !== 'undefined' && window.storage !== null);
async function storageGet(key, shared){
  if(HAS_CLAUDE_STORAGE) return await window.storage.get(key, shared);
  if(shared) return null;
  try{ const raw = localStorage.getItem('lenvir_ls_'+key); return raw!==null ? {key:key,value:raw,shared:false} : null; }catch(e){ return null; }
}
async function storageSet(key, value, shared){
  if(HAS_CLAUDE_STORAGE) return await window.storage.set(key, value, shared);
  if(shared) return null;
  try{ localStorage.setItem('lenvir_ls_'+key, value); return {key:key,value:value,shared:false}; }catch(e){ return null; }
}

function defaultProgress(){
  const modules = {};
  for(const mid in MODULE_META){
    const lessons = {};
    for(let l=1;l<=MODULE_META[mid].lessons;l++){ lessons[l] = {stars:0, completed:false, bestAcc:0}; }
    modules[mid] = lessons;
  }
  return { totalXP:0, streak:0, lastCompletionDate:null, modules, flags:{}, reviewQueue:[], correctEver:[],
    streakFreezes:0, lastFreezeGrantMonth:null, salvavidas:0, soundEnabled:true };
}
function ensureShape(){
  if(!progress || typeof progress!=="object") progress = defaultProgress();
  if(!progress.modules) progress.modules = defaultProgress().modules;
  for(const mid in MODULE_META){
    if(!progress.modules[mid]) progress.modules[mid] = {};
    for(let l=1;l<=MODULE_META[mid].lessons;l++){
      if(!progress.modules[mid][l]) progress.modules[mid][l] = {stars:0, completed:false, bestAcc:0};
    }
  }
  if(typeof progress.totalXP !== "number") progress.totalXP = 0;
  if(typeof progress.streak !== "number") progress.streak = 0;
  if(progress.lastCompletionDate === undefined) progress.lastCompletionDate = null;
  if(!progress.flags) progress.flags = {};
  if(!Array.isArray(progress.reviewQueue)) progress.reviewQueue = [];
  if(!Array.isArray(progress.correctEver)) progress.correctEver = [];
  if(typeof progress.streakFreezes !== "number") progress.streakFreezes = 0;
  if(progress.lastFreezeGrantMonth === undefined) progress.lastFreezeGrantMonth = null;
  if(typeof progress.salvavidas !== "number") progress.salvavidas = 0;
  if(typeof progress.soundEnabled !== "boolean") progress.soundEnabled = true;
}
function grantMonthlyFreeze(){
  const ym = new Date().toISOString().slice(0,7);
  if(progress.lastFreezeGrantMonth !== ym && progress.streakFreezes < 1){
    progress.streakFreezes = 1;
  }
  if(progress.lastFreezeGrantMonth !== ym){
    progress.lastFreezeGrantMonth = ym;
  }
}
async function loadProgress(){
  try{ const r = await storageGet(STORAGE_KEY, false); progress = r ? JSON.parse(r.value) : defaultProgress(); }
  catch(e){ progress = defaultProgress(); }
  ensureShape();
  grantMonthlyFreeze();
  state.screen = "map";
  render();
}
async function saveProgress(){
  try{ await storageSet(STORAGE_KEY, JSON.stringify(progress), false); }
  catch(e){ console.error("No se pudo guardar el progreso", e); }
}

/* ---------------- sonido y vibracion ---------------- */
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}
function playTone(freqs, durations, type){
  if(!progress.soundEnabled) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  try{
    let t = ctx.currentTime;
    freqs.forEach(function(f,i){
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.16, t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+durations[i]);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+durations[i]+0.02);
      t += durations[i];
    });
  }catch(e){}
}
function playCorrectSound(){ playTone([880,1320],[0.09,0.13],'sine'); }
function playWrongSound(){ playTone([220],[0.18],'sawtooth'); }
function vibrateDevice(pattern){ try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){} }

/* ---------------- confeti ---------------- */
function burstConfetti(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const app = document.getElementById('app');
  if(!app) return;
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  const colors = ['#0056F5','#05DA95','#F5B400','#FFFFFF','#0040C2'];
  for(let i=0;i<36;i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece';
    p.style.left = (Math.random()*100)+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = (Math.random()*0.3)+'s';
    p.style.animationDuration = (1.1+Math.random()*0.8)+'s';
    p.style.transform = 'rotate('+Math.floor(Math.random()*360)+'deg)';
    layer.appendChild(p);
  }
  app.appendChild(layer);
  setTimeout(function(){ layer.remove(); }, 2200);
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function isModuleUnlocked(mid){
  const idx = Object.keys(MODULE_META).indexOf(String(mid));
  if(idx<=0) return true;
  const prevMid = Object.keys(MODULE_META)[idx-1];
  const prevMeta = MODULE_META[prevMid];
  for(let l=1;l<=prevMeta.lessons;l++){ if(!progress.modules[prevMid][l].completed) return false; }
  return true;
}
function isLessonUnlocked(mid, lessonNum){
  if(!isModuleUnlocked(mid)) return false;
  if(lessonNum===1) return true;
  return progress.modules[mid][lessonNum-1].completed;
}
function moduleStatus(mid){
  if(!isModuleUnlocked(mid)) return "locked";
  const meta = MODULE_META[mid];
  let allDone = true, anyDone = false;
  for(let l=1;l<=meta.lessons;l++){ if(progress.modules[mid][l].completed) anyDone=true; else allDone=false; }
  if(allDone) return "done";
  return "current";
}
function getEarnedBadgeIds(p){ return BADGES.filter(b=>b.check(p)).map(b=>b.id); }

}

/* ---------------- render root ---------------- */
function clearTimerHandle(){ if(timerHandle){ clearInterval(timerHandle); timerHandle=null; } }
function startTimerTick(){
  clearTimerHandle();
  const tickFn = function(){
    const el = document.getElementById('timer-value');
    const L = state.lesson;
    if(!el || !L || L.answered !== null){ clearTimerHandle(); return; }

function render(){

/* ---------------- LESSON ---------------- */
function comboMultiplier(combo){
  if(combo>=8) return 2;
  if(combo>=5) return 1.5;
  if(combo>=3) return 1.2;
  return 1;
}
function startLesson(mid, lessonNum){
  const pool = CASES.filter(function(c){ return String(c.mod)===String(mid) && c.lesson===lessonNum; });
  const queue = shuffle(pool);
  state.lesson = { mod:mid, lesson:lessonNum, queue:queue, idx:0, lives:5, correctCount:0, xpGained:0, answered:null, failed:false, isReview:false, results:[], timeScores:[], qStart:Date.now(), comboCount:0, eliminatedIdx:null, fiftyUsedThisQ:false };
  state.activeModule = null;
  state.screen = "lesson";
  render();
}
function startReviewLesson(){
  const items = (progress.reviewQueue||[]).map(function(rq){ return CASES.find(function(c){ return c.id===rq.caseId; }); }).filter(Boolean);
  if(items.length===0) return;
  const queue = shuffle(items).slice(0, Math.min(10, items.length));
  state.lesson = { mod:null, lesson:null, queue:queue, idx:0, lives:5, correctCount:0, xpGained:0, answered:null, failed:false, isReview:true, results:[], timeScores:[], qStart:Date.now(), comboCount:0, eliminatedIdx:null, fiftyUsedThisQ:false };
  state.screen = "lesson";
  render();
}
function renderLesson(){
  const L = state.lesson;
  const q = L.queue[L.idx];
  const pct = Math.round((L.idx/L.queue.length)*100);
  const livesHtml = Array.from({length:5}).map(function(_,i){ return '<div class="life-icon">'+iconHex(i<L.lives)+'</div>'; }).join("");
  const optionsHtml = q.options.map(function(opt,i){
    let cls = "option"; let disabledAttr = "";
    if(L.answered!==null){
      disabledAttr = "disabled";
      if(i===q.correctIndex) cls += " correct";
      else if(i===L.answered) cls += " wrong";
      else cls += " dim";
    } else if(L.eliminatedIdx===i){
      cls += " eliminated"; disabledAttr = "disabled";
    }
    return '<button class="'+cls+'" data-idx="'+i+'" '+disabledAttr+'><span class="badge">'+"ABC"[i]+'</span><span>'+escapeHtml(opt)+'</span></button>';
  }).join("");
  let feedbackHtml = "";
  if(L.answered!==null){
    const correct = L.answered===q.correctIndex;
    const xpLabel = L.isReview ? '+5 XP' : '+'+L.lastXpEarned+' XP';
    feedbackHtml = '<div class="feedback-sheet '+(correct?'ok':'bad')+'">'
      + '<div class="fb-row"><div class="stamp">'+(correct?'\u00a1DOMINADO!':'A REPASAR')+'</div>'
      + '<div class="fb-text"><div class="fb-title">'+(correct?('\u00a1Correcto! '+xpLabel):'No es esta definici\u00f3n')+'</div></div></div>'
      + '<div class="fb-body">'+escapeHtml(q.feedback)+'</div>'
      + '<button class="fb-continue" id="btn-continue">Continuar</button></div>';
  }
  const timerSeconds = L.answered===null ? (Date.now()-L.qStart)/1000 : (L.lastElapsedSeconds||0);
  const timerCls = L.answered===null ? 'timer-badge ticking' : 'timer-badge frozen';
  const timerHtml = '<div class="'+timerCls+'">'+iconClock()+'<span id="timer-value">'+formatTime(timerSeconds)+'</span></div>';
  const comboHtml = (L.comboCount>=3 && L.answered===null) ? '<div class="combo-badge">'+iconFlame()+'Combo x'+L.comboCount+' \u00b7 '+comboMultiplier(L.comboCount)+'x XP</div>' : '';
  const showFifty = (!L.isReview && L.answered===null && !L.fiftyUsedThisQ && progress.salvavidas>0);
  const fiftyHtml = showFifty ? '<button class="fifty-btn" id="btn-fifty">50/50 \u00b7 '+progress.salvavidas+'</button>' : '';
  return '<div class="lesson-top"><button class="exit-btn" id="btn-exit">'+iconClose()+'</button>'
    + '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'
    + '<div class="lives">'+livesHtml+'</div></div>'
    + '<div class="lesson-body">'
    + '<div class="case-tag-row"><div class="case-tag">'+q.id+(L.isReview?' \u00b7 REPASO':'')+'</div>'+timerHtml+'</div>'
    + '<div class="term-card"><div class="term-word">'+escapeHtml(q.termino)+'</div></div>'
    + '<div class="term-prompt">\u00bfCu\u00e1l es la definici\u00f3n correcta?</div>'
    + comboHtml + fiftyHtml
    + '<div class="options">'+optionsHtml+'</div></div>'
    + feedbackHtml;
}
function attachLessonEvents(){
  document.getElementById('btn-exit').onclick = function(){
    if(confirm("\u00bfSalir de la lecci\u00f3n? Perder\u00e1s el avance de esta sesi\u00f3n.")){ clearTimerHandle(); state.screen = "map"; state.lesson = null; render(); }
  };
  const L = state.lesson;
  if(L.answered===null){
    document.querySelectorAll('.option').forEach(function(btn){ btn.onclick = function(){ selectOption(parseInt(btn.dataset.idx,10)); }; });
    const fiftyBtn = document.getElementById('btn-fifty');
    if(fiftyBtn) fiftyBtn.onclick = useFiftyFifty;
    startTimerTick();
  } else {
    clearTimerHandle();
    const cont = document.getElementById('btn-continue');
    if(cont) cont.onclick = nextQuestion;
  }
}
function useFiftyFifty(){
  const L = state.lesson;
  if(L.answered!==null || L.fiftyUsedThisQ || progress.salvavidas<=0) return;
  const q = L.queue[L.idx];
  const wrongIndices = [0,1,2].filter(function(i){ return i!==q.correctIndex; });
  L.eliminatedIdx = wrongIndices[Math.floor(Math.random()*wrongIndices.length)];
  L.fiftyUsedThisQ = true;
  progress.salvavidas--;
  saveProgress();
  render();
}
function selectOption(optIdx){
  const L = state.lesson;
  if(L.answered!==null) return;
  const q = L.queue[L.idx];
  L.answered = optIdx;
  const correct = optIdx===q.correctIndex;

  const elapsed = Math.max(1, (Date.now()-L.qStart)/1000);
  L.lastElapsedSeconds = elapsed;
  const rawTime = Math.max(40, Math.min(130, Math.round((EXPECTED_TIME/elapsed)*100)));
  L.timeScores.push(rawTime);
  L.results.push({caseId:q.id, correct:correct});

  if(correct){
    L.comboCount = (L.comboCount||0) + 1;
    const baseXp = L.isReview ? 5 : 10;
    const mult = L.isReview ? 1 : comboMultiplier(L.comboCount);
    const earned = Math.round(baseXp*mult);
    L.lastXpEarned = earned;
    L.correctCount++; L.xpGained += earned;
    if(progress.correctEver.indexOf(q.id)===-1) progress.correctEver.push(q.id);
    playCorrectSound(); vibrateDevice(15);
  } else {
    L.comboCount = 0;
    L.lives--;
    playWrongSound(); vibrateDevice([0,40,30,40]);
    if(!L.isReview){
      if(!progress.reviewQueue.find(function(rq){ return rq.caseId===q.id; })){
        progress.reviewQueue.push({caseId:q.id, timesCorrect:0});
      }
    }
  }
  clearTimerHandle();
  render();
}
function nextQuestion(){
  const L = state.lesson;
  if(L.lives<=0){ L.failed = true; finishLesson(); return; }
  L.idx++; L.answered = null; L.qStart = Date.now(); L.eliminatedIdx = null; L.fiftyUsedThisQ = false;
  if(L.idx>=L.queue.length){ finishLesson(); return; }
  render();
}
function finishLesson(){
  clearTimerHandle();
  const L = state.lesson;
  const total = L.queue.length;
  const acc = total? L.correctCount/total : 0;

  if(L.isReview){
    L.results.forEach(function(r){
      const idx = progress.reviewQueue.findIndex(function(rq){ return rq.caseId===r.caseId; });
      if(idx>=0){
        if(r.correct){
          progress.reviewQueue[idx].timesCorrect = (progress.reviewQueue[idx].timesCorrect||0)+1;
          if(progress.reviewQueue[idx].timesCorrect>=2) progress.reviewQueue.splice(idx,1);
        } else { progress.reviewQueue[idx].timesCorrect = 0; }
      }
    });
    progress.totalXP += L.xpGained;
    L.acc = acc;
    saveProgress();
    state.screen = "summary"; render(); return;
  }

  const prevBadges = getEarnedBadgeIds(progress);
  const tiempoRaw = L.timeScores.length ? L.timeScores.reduce(function(a,b){return a+b;},0)/L.timeScores.length : 70;

  let stars = 0;
  let streakInfo = {freezeUsed:false, milestoneHit:false, salvavidaGranted:false};
  if(!L.failed){
    if(acc>=1) stars=3; else if(acc>=0.8) stars=2; else if(acc>=0.6) stars=1; else stars=0;
    if(acc>=1) L.xpGained += 20;
    L.chestBonus = weightedChestBonus();
    L.xpGained += L.chestBonus;
    const rec = progress.modules[L.mod][L.lesson];
    rec.completed = true;
    rec.stars = Math.max(rec.stars, stars);
    rec.bestAcc = Math.max(rec.bestAcc, acc);
    progress.totalXP += L.xpGained;
    if(!progress.flags) progress.flags = {};
    if(acc>=1) progress.flags.hadPerfectLesson = true;
    if(acc>=1 && tiempoRaw>=100) progress.flags.hadFastPerfect = true;
    streakInfo = updateStreak();
  }
  L.freezeUsed = streakInfo.freezeUsed;
  L.streakMilestoneHit = streakInfo.milestoneHit;
  L.salvavidaGranted = streakInfo.salvavidaGranted;

  const newBadges = getEarnedBadgeIds(progress).filter(function(id){ return prevBadges.indexOf(id)===-1; });
  L.newBadges = newBadges;
  L.stars = stars; L.acc = acc;

  saveProgress();
  state.screen = "summary";
  state.chestOpened = false;
  render();
}
function weightedChestBonus(){
  const r = Math.random();
  if(r<0.05) return 60;
  if(r<0.20) return 35;
  if(r<0.55) return 20;
  return 10;
}
function updateStreak(){
  const today = new Date().toISOString().slice(0,10);
  const result = {freezeUsed:false, milestoneHit:false, salvavidaGranted:false};
  if(progress.lastCompletionDate === today) return result;
  if(progress.lastCompletionDate){
    const diffDays = Math.round((new Date(today) - new Date(progress.lastCompletionDate)) / 86400000);
    if(diffDays===1){
      progress.streak += 1;
    } else if(diffDays===2 && progress.streakFreezes>0){
      progress.streakFreezes -= 1;
      progress.streak += 1;
      result.freezeUsed = true;
    } else {
      progress.streak = 1;
    }
  } else { progress.streak = 1; }
  progress.lastCompletionDate = today;
  if(progress.streak>0 && progress.streak%5===0){
    progress.salvavidas += 1;
    result.salvavidaGranted = true;
  }
  if([7,30,100].indexOf(progress.streak)!==-1){ result.milestoneHit = true; }
  return result;
}

/* ---------------- SUMMARY ---------------- */
function renderSummary(){
  const L = state.lesson;
  const total = L.queue.length;
  if(L.isReview){
    return '<div class="summary-wrap"><div class="summary-stamp">'+bigIcon(iconCheckHero(),'var(--blue-dark)')+'</div>'
      + '<h2 class="summary-title">Repaso completado</h2>'
      + '<div class="summary-sub">Conceptos revisados de tu lista pendiente</div>'
      + '<div class="summary-grid"><div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div>'
      + '<div class="summary-box"><div class="num">+'+L.xpGained+'</div><div class="lbl">XP ganado</div></div></div>'
      + '<button class="btn-primary" id="btn-tomap">Continuar</button></div>';
  }
  if(L.failed){
    return '<div class="summary-wrap"><div class="summary-stamp fail">'+bigIcon(iconXHero(),'var(--error)')+'</div>'
      + '<h2 class="summary-title">Lecci\u00f3n incompleta</h2>'
      + '<div class="summary-sub">Se agotaron tus 5 vidas en M'+L.mod+' \u00b7 Lecci\u00f3n '+L.lesson+'</div>'
      + '<div class="summary-grid"><div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div>'
      + '<div class="summary-box"><div class="num">'+(L.idx+1)+'/'+total+'</div><div class="lbl">Avanzado</div></div></div>'
      + '<button class="btn-primary" id="btn-retry">Reintentar lecci\u00f3n</button>'
      + '<button class="btn-ghost" id="btn-tomap">Volver al mapa</button></div>';
  }
  const badgesHtml = (L.newBadges&&L.newBadges.length) ? '<div class="badges-toast"><b>\ud83c\udfc5 Nueva(s) insignia(s)</b>'+L.newBadges.map(function(id){ return BADGES.find(function(b){return b.id===id;}).name; }).join(", ")+'</div>' : "";
  const freezeHtml = L.freezeUsed ? '<div class="badges-toast">\u2744\ufe0f Tu racha se congel\u00f3 para proteger un d\u00eda perdido.</div>' : "";
  const salvavidaHtml = L.salvavidaGranted ? '<div class="badges-toast">\ud83d\udee1\ufe0f +1 comod\u00edn 50/50 por mantener tu racha.</div>' : "";
  let chestHtml = "";
  if(L.chestBonus){
    chestHtml = state.chestOpened
      ? '<div class="chest-opened">\u2728 +'+L.chestBonus+' XP de bono \u2728</div>'
      : '<button class="chest-btn" id="btn-chest">\ud83c\udf81 Toca para abrir tu cofre</button>';
  }
  return '<div class="summary-wrap"><div class="summary-stamp">'+bigIcon(iconCheckHero(),'var(--green-dark)')+'</div>'
    + '<h2 class="summary-title">Lecci\u00f3n completada</h2>'
    + '<div class="summary-sub">M'+L.mod+' \u00b7 Lecci\u00f3n '+L.lesson+'</div>'
    + '<div class="summary-stars">'+[0,1,2].map(i=>iconStar(i<L.stars)).join("")+'</div>'
    + chestHtml + badgesHtml + freezeHtml + salvavidaHtml
    + '<div class="summary-grid"><div class="summary-box"><div class="num">'+Math.round(L.acc*100)+'%</div><div class="lbl">Precisi\u00f3n</div></div>'
    + '<div class="summary-box"><div class="num">+'+L.xpGained+'</div><div class="lbl">XP ganado</div></div>'
    + '<div class="summary-box"><div class="num">'+L.correctCount+'/'+total+'</div><div class="lbl">Correctas</div></div></div>'
    + '<button class="btn-primary" id="btn-tomap">Continuar</button>'
    + '<button class="btn-ghost" id="btn-retry">Repasar de nuevo</button></div>';
}
function attachSummaryEvents(){
  const L = state.lesson;
  document.getElementById('btn-tomap').onclick = function(){ state.screen="map"; state.lesson=null; state.chestOpened=false; render(); };
  const retry = document.getElementById('btn-retry');
  if(retry) retry.onclick = function(){ state.chestOpened=false; if(L.isReview) startReviewLesson(); else startLesson(L.mod, L.lesson); };
  const chestBtn = document.getElementById('btn-chest');
  if(chestBtn) chestBtn.onclick = function(){ state.chestOpened = true; playCorrectSound(); render(); };
  if(!L.isReview && !L.failed && (L.acc>=1 || L.streakMilestoneHit) && !L.confettiShown){
    L.confettiShown = true;
    burstConfetti();
  }
}

loadProgress();
</script>
